name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check tender_timeline tests
      - name: Validate data
        run: python -m tender_timeline.validate_items --items data/public_dev/items
      - name: Verify gold (oracle == authored answers)
        run: python -m tender_timeline.validate_items --items data/public_dev/items --verify-gold
      - name: Test
        run: pytest
      - name: Grade sample
        run: python -m tender_timeline.grade --items data/public_dev/items --predictions baselines/outputs/sample_model_outputs.jsonl --out reports/sample_grade_results.json
      - name: Build leaderboard
        run: python -m tender_timeline.aggregate --results-dir baselines/outputs --out reports/leaderboard.md
